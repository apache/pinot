name: Pinot LinkedIn Publication Pipeline

on:
  schedule:
    - cron: "0 3 * * *"   # run daily at 03:00 UTC
  workflow_dispatch: { }

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      MVN_JFROG_USER: ${{ secrets.MVN_JFROG_USER }}
      MVN_JFROG_KEY: ${{ secrets.MVN_JFROG_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      # Compute a unique release version: <base>-li-<run>
      - name: Compute & set version
        shell: bash
        run: |
          # 1) Get base version from POM (strip -SNAPSHOT if present)
          set -euo pipefail
          BASE=$(mvn -q --non-recursive exec:exec -Dexec.executable=echo -Dexec.args='${project.version}')
          BASE=${BASE%-SNAPSHOT}
          
          # 2) Compose new version, e.g. 1.4.0-li-1
          NEW_VERSION="${BASE}-li-${GITHUB_RUN_NUMBER}"
          echo "Setting project version to: $NEW_VERSION"
          
          mvn -B -q versions:set -DnewVersion="$NEW_VERSION" -DgenerateBackupPoms=false
          mvn -B -q versions:commit

      - name: Build & Deploy to Artifactory
        run: |
          mvn -B -T1C clean deploy \
            -DskipTests \
            -Pbin-dist -Pbuild-shaded-jar \
            --no-transfer-progress \
            -Djdk.version=11 \
            -s ci.settings.xml \
            -DretryFailedDeploymentCount=5 \
            -DaltDeploymentRepository=central::default::https://linkedin.jfrog.io/artifactory/pinot

      - name: Print pinot-lnkd-deps tree
        run: |
          echo "Dependency tree for pinot-lnkd-deps:"
          mvn -B dependency:tree -pl pinot-lnkd-deps -s ci.settings.xml || true