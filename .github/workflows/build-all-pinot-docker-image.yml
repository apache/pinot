name: "[Pinot Release] Pinot Release All Java Distro Docker Image Build and Publish"

on:
  workflow_dispatch:
    inputs:
      commit:
        description: "The branch/tag/commit to build the Pinot image from."
        default: "master"
        required: true
      tags:
        description: "Tags to push, comma separated, e.g. tag1,tag2,tag3"
        default: ""

jobs:
  generate-build-info:
    name: Generate Build Info
    runs-on: ubuntu-24.04
    outputs:
      commit-id: ${{ steps.generate-build-info.outputs.commit-id }}
      tags: ${{ steps.generate-build-info.outputs.tags }}
    steps:
      - uses: actions/checkout@v6
      - name: Generate Build Info
        id: generate-build-info
        env:
          PINOT_GIT_REF: "${{ github.event.inputs.commit }}"
          TAGS: "${{ github.event.inputs.tags }}"
        run: |
          .github/workflows/scripts/docker/.pinot_build_info_gen.sh
  compile-pinot:
    # Pinot is compiled once per JDK version using the amazoncorretto build base.
    # JVM bytecode is vendor-neutral, so the resulting build image is shared by all
    # runtime distros (ms-openjdk, amazoncorretto) for the same JDK version.
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        java-version: ["21", "25"]
    name: Compile JDK-${{ matrix.java-version }} Pinot
    needs: [generate-build-info]
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: actions/checkout@v6
      - name: Compile Pinot and push build image
        env:
          DOCKER_FILE_BASE_DIR: "docker/images/pinot"
          DOCKER_IMAGE_NAME: "apachepinot/pinot"
          PINOT_GIT_REF: "${{ needs.generate-build-info.outputs.commit-id }}"
          JDK_VERSION: ${{ matrix.java-version }}
        run: .github/workflows/scripts/docker/.pinot_compile_and_push_build_image.sh
        timeout-minutes: 240
  package-pinot-docker-image:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        java-disto: ["ms-openjdk", "amazoncorretto"]
        java-version: ["21", "25"]
        arch: ["amd64", "arm64"]
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    name: Package ${{ matrix.java-disto }}-${{ matrix.java-version }} ${{ matrix.arch }}
    needs: [generate-build-info, compile-pinot]
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: actions/checkout@v6
      - name: Package and push the Docker image
        env:
          DOCKER_FILE_BASE_DIR: "docker/images/pinot"
          DOCKER_IMAGE_NAME: "apachepinot/pinot"
          JDK_VERSION: "${{ matrix.java-version }}"
          RUNTIME_IMAGE_TAGS: "${{ matrix.java-version }}-${{ matrix.java-disto }}"
          PINOT_GIT_REF: "${{ needs.generate-build-info.outputs.commit-id }}"
          BUILD_ARCH: ${{ matrix.arch }}
          TAGS: "${{ needs.generate-build-info.outputs.tags }}"
        run: .github/workflows/scripts/docker/.pinot_package_single_platform.sh
        timeout-minutes: 60
  create-multi-arch-manifest:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        java-disto: ["ms-openjdk", "amazoncorretto"]
        java-version: ["21", "25"]
    name: Create ${{ matrix.java-disto }}-${{ matrix.java-version }} Multi-Arch Manifest
    needs: [generate-build-info, package-pinot-docker-image]
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: actions/checkout@v6
      - name: Create Multi-Arch Manifest
        env:
          TAGS: "${{ needs.generate-build-info.outputs.tags }}"
          BUILD_PLATFORM: "linux/arm64,linux/amd64"
          BASE_IMAGE_TAGS: "${{ matrix.java-version }}-${{ matrix.java-disto }}"
        run: .github/workflows/scripts/docker/.pinot_multi_arch_docker_image_manifest_package.sh
