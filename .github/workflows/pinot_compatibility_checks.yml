name: Pinot Compatibility Checks

on:
  push:
    branches:
      - master
    paths-ignore:
      - "contrib/**"
      - "docs/**"
      - "docker/**"
      - "kubernetes/**"
      - "licenses/**"
      - "licenses-binary/**"
      - "**.md"
  pull_request:
    branches:
      - master
    paths-ignore:
      - "contrib/**"
      - "docs/**"
      - "docker/**"
      - "kubernetes/**"
      - "licenses/**"
      - "licenses-binary/**"
      - "**.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  binary-compat-check:
    if: github.repository == 'apache/pinot'
    runs-on: ubuntu-latest
    name: Pinot Binary Compatibility Check
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'
      # Step that does that actual cache save and restore
      - uses: actions/cache@v5
        env:
          SEGMENT_DOWNLOAD_TIMEOUT_MINS: 10
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      # Build the PR branch's Java 11 artifact surface to get new JARs to validate and compare
      - name: Build Java 11 artifacts on PR branch
        timeout-minutes: 120
        run: |
          JAVA11_MODULES=(
            pinot-spi
            pinot-segment-spi
            pinot-common
            pinot-timeseries/pinot-timeseries-spi
            pinot-clients/pinot-java-client
            pinot-clients/pinot-jdbc-client
          )
          mvn clean package -T1C -pl "$(IFS=,; echo "${JAVA11_MODULES[*]}")" -am -DskipTests -DskipShade
      - name: Validate Java 11 artifact bytecode
        run: |
          python3 - <<'PY'
          import glob
          import os
          import struct
          import sys
          import zipfile

          modules = {
              "pinot-spi": "pinot-spi",
              "pinot-segment-spi": "pinot-segment-spi",
              "pinot-common": "pinot-common",
              "pinot-timeseries/pinot-timeseries-spi": "pinot-timeseries-spi",
              "pinot-clients/pinot-java-client": "pinot-java-client",
              "pinot-clients/pinot-jdbc-client": "pinot-jdbc-client",
          }
          max_major = 55
          violations = []

          def main_artifact(module, artifact_id):
              candidates = []
              for path in glob.glob(f"{module}/target/{artifact_id}-*.jar"):
                  name = os.path.basename(path)
                  if name.startswith("original-"):
                      continue
                  if name.endswith(("-sources.jar", "-javadoc.jar", "-tests.jar", "-shaded.jar")):
                      continue
                  candidates.append(path)
              if len(candidates) != 1:
                  raise RuntimeError(f"Expected one main artifact for {module}, found: {candidates}")
              return candidates[0]

          for module, artifact_id in modules.items():
              jar_path = main_artifact(module, artifact_id)
              print(f"Validating {jar_path}")
              with zipfile.ZipFile(jar_path) as jar:
                  for entry in jar.namelist():
                      if not entry.endswith(".class"):
                          continue
                      data = jar.read(entry)[:8]
                      magic, _minor, major = struct.unpack(">IHH", data)
                      if magic != 0xCAFEBABE:
                          violations.append(f"{jar_path}!/{entry}: invalid classfile magic")
                      elif major > max_major:
                          violations.append(f"{jar_path}!/{entry}: classfile major {major} > {max_major}")

          if violations:
              print("Found classes above Java 11 bytecode:", file=sys.stderr)
              print("\n".join(violations[:100]), file=sys.stderr)
              if len(violations) > 100:
                  print(f"... and {len(violations) - 100} more", file=sys.stderr)
              sys.exit(1)
          PY
      - name: Checkout master into a subfolder
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: master-head
      # Build the same module on master to produce the baseline JAR
      - name: Build SPI on master
        timeout-minutes: 120
        run: |
          cd master-head || exit 1
          for mod in pinot-spi pinot-segment-spi; do
            mvn clean package -T1C -pl $mod -am -DskipTests -Dproject.build.finalName="$mod"
          done
      # Download the japicmp standalone JAR which will be used to compare APIs
      - name: Download japicmp CLI
        run: |
          JAPICMP_VER=0.23.1
          curl -fSL --retry 3 --retry-delay 5 \
          -o japicmp.jar \
          "https://repo1.maven.org/maven2/com/github/siom79/japicmp/japicmp/${JAPICMP_VER}/japicmp-${JAPICMP_VER}-jar-with-dependencies.jar"
      # Locate the old JAR (from master) and the new JAR (PR) and run japicmp to compare
      - name: Compare API
        run: |
          for mod in pinot-spi pinot-segment-spi; do
            OLD=$(ls master-head/$mod/target/$mod-*.jar | grep -v '\-tests.jar' | head -1)
            NEW=$(ls $mod/target/$mod-*.jar | grep -v '\-tests.jar' | head -1)

            java -jar japicmp.jar \
              --old "$OLD" \
              --new "$NEW" \
              --error-on-binary-incompatibility \
              --only-incompatible \
              --ignore-missing-classes
          done
  compatibility-verifier:
    if: github.repository == 'apache/pinot'
    runs-on: ubuntu-latest
    strategy:
      # Changed to false in order to improve coverage using unsafe buffers
      fail-fast: false
      matrix:
        test_suite: [ "compatibility-verifier/sample-test-suite" ]
        old_commit: [
          "release-1.5.0", "master"
        ]
    name: Pinot Compatibility Regression Testing against ${{ matrix.old_commit }} on ${{ matrix.test_suite }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: v16.15.0
          cache: 'npm'
          cache-dependency-path: pinot-controller/src/main/resources/package-lock.json
      - name: Install npm
        run: |
          npm install -g npm@8.5.5
          npm --version
      # Step that does that actual cache save and restore
      - uses: actions/cache@v5
        env:
          SEGMENT_DOWNLOAD_TIMEOUT_MINS: 10
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Pinot Compatibility Regression Testing
        env:
          OLD_COMMIT: ${{ matrix.old_commit }}
          WORKING_DIR: /tmp/compatibility-verifier
          TEST_SUITE: ${{ matrix.test_suite }}
          MAVEN_OPTS: >
            -Xmx2G -DskipShade -DfailIfNoTests=false -Dmaven.wagon.httpconnectionManager.ttlSeconds=25
            -Dmaven.wagon.http.retryHandler.count=30 -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false
            -B -ntp
            -XX:+IgnoreUnrecognizedVMOptions
            --add-exports=jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED
            --add-exports=jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED
            --add-exports=jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED
            --add-exports=jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED
            --add-exports=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED
        timeout-minutes: 120
        run: |
          .github/workflows/scripts/.pinot_compatibility_verifier.sh
  multi-stage-compatibility-verifier:
    if: github.repository == 'apache/pinot'
    runs-on: ubuntu-latest
    strategy:
      # Changed to false in order to improve coverage using unsafe buffers
      fail-fast: false
      matrix:
        test_suite: [ "compatibility-verifier/multi-stage-query-engine-test-suite" ]
        old_commit: [
          "release-1.5.0", "master"
        ]
    name: Pinot Multi-Stage Query Engine Compatibility Regression Testing against ${{ matrix.old_commit }} on ${{ matrix.test_suite }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: v16.15.0
          cache: 'npm'
          cache-dependency-path: pinot-controller/src/main/resources/package-lock.json
      - name: Install npm
        run: |
          npm install -g npm@8.5.5
          npm --version
      # Step that does that actual cache save and restore
      - uses: actions/cache@v5
        env:
          SEGMENT_DOWNLOAD_TIMEOUT_MINS: 10
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Pinot Multi-Stage Query Engine Compatibility Regression Testing
        env:
          OLD_COMMIT: ${{ matrix.old_commit }}
          WORKING_DIR: /tmp/multi-stage-compatibility-verifier
          TEST_SUITE: ${{ matrix.test_suite }}
          MAVEN_OPTS: >
            -Xmx2G -DskipShade -DfailIfNoTests=false -Dmaven.wagon.httpconnectionManager.ttlSeconds=25
            -Dmaven.wagon.http.retryHandler.count=30 -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false
            -B -ntp
            -XX:+IgnoreUnrecognizedVMOptions
            --add-exports=jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED
            --add-exports=jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED
            --add-exports=jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED
            --add-exports=jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED
            --add-exports=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED
        timeout-minutes: 120
        run: |
          .github/workflows/scripts/.pinot_compatibility_verifier.sh
