name: Auto Label Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  label-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Label issues by keywords
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const title = (issue.title || '').toLowerCase();
            const body = (issue.body || '').toLowerCase();
            const text = `${title} ${body}`;
            const labels = new Set();

            // --- Type labels (all exist in the repo) ---
            const typeRules = [
              { keywords: ['bug', 'error', 'fail', 'crash', 'exception', 'npe', 'nullpointer',
                           'broken', 'incorrect', 'wrong result', 'not working'],
                label: 'bug' },
              { keywords: ['regression'],
                label: 'type: regression' },
              { keywords: ['feature request', 'new feature', 'support for', 'add support',
                           'would be nice', 'proposal'],
                label: 'feature request' },
              { keywords: ['enhancement', 'improvement', 'improve'],
                label: 'enhancement' },
              { keywords: ['performance', 'slow', 'latency', 'throughput', 'optimize'],
                label: 'performance' },
              { keywords: ['memory usage', 'oom', 'out of memory', 'gc pressure', 'memory leak'],
                label: 'memory' },
              { keywords: ['security', 'vulnerability', 'cve', 'injection', 'xss'],
                label: 'security' },
              { keywords: ['auth', 'authentication', 'authorization'],
                label: 'auth' },
              { keywords: ['documentation', 'docs', 'readme', 'javadoc', 'typo in doc'],
                label: 'documentation' },
              { keywords: ['ui', 'query console', 'dashboard', 'web ui', 'frontend', 'pinot ui'],
                label: 'ui' },
              { keywords: ['observability', 'logging', 'monitoring', 'tracing'],
                label: 'observability' },
              { keywords: ['configuration', 'config', 'property', 'properties'],
                label: 'configuration' },
            ];

            for (const rule of typeRules) {
              if (rule.keywords.some(kw => text.includes(kw))) {
                labels.add(rule.label);
              }
            }

            // --- Component labels (all exist in the repo) ---
            const componentRules = [
              { keywords: ['broker', 'query routing', 'scatter gather', 'scatter-gather'],
                label: 'component: broker' },
              { keywords: ['controller', 'cluster management', 'table creation',
                           'segment management'],
                label: 'component: controller' },
              { keywords: ['server', 'segment loading', 'query execution'],
                label: 'component: server' },
              { keywords: ['minion', 'minion task', 'segment merge', 'segment purge'],
                label: 'minion' },
              { keywords: ['multi-stage', 'multistage', 'msqe', 'v2 engine'],
                label: 'multi-stage' },
              { keywords: ['query planner'],
                label: 'component: query-planner' },
              { keywords: ['query runtime'],
                label: 'component: query-runtime' },
              { keywords: ['segment', 'forward index', 'inverted index', 'range index',
                           'json index', 'bloom filter'],
                label: 'component: segment' },
              { keywords: ['index', 'indexing'],
                label: 'index' },
              { keywords: ['inverted index'],
                label: 'inverted-index' },
              { keywords: ['star-tree', 'startree', 'star tree'],
                label: 'star-tree index' },
              { keywords: ['text search', 'text index', 'full text'],
                label: 'text-search' },
              { keywords: ['kafka'],
                label: 'kafka' },
              { keywords: ['kinesis'],
                label: 'kinesis' },
              { keywords: ['pulsar'],
                label: 'pulsar' },
              { keywords: ['stream ingestion', 'realtime', 'real-time', 'real time'],
                label: 'real-time' },
              { keywords: ['batch ingestion', 'spark ingestion', 'offline ingestion'],
                label: 'ingestion' },
              { keywords: ['hadoop'],
                label: 'hadoop' },
              { keywords: ['s3', 'gcs', 'hdfs', 'adls', 'filesystem', 'file system'],
                label: 'pinot-filesystem' },
              { keywords: ['docker', 'container'],
                label: 'docker' },
              { keywords: ['kubernetes', 'k8s'],
                label: 'kubernetes' },
              { keywords: ['helm'],
                label: 'helm' },
              { keywords: ['timeseries', 'time series', 'm3ql'],
                label: 'timeseries-engine' },
              { keywords: ['upsert'],
                label: 'upsert' },
              { keywords: ['dedup', 'deduplication'],
                label: 'dedup' },
              { keywords: ['window function', 'window functions'],
                label: 'window-functions' },
              { keywords: ['query', 'sql'],
                label: 'query' },
            ];

            for (const rule of componentRules) {
              if (rule.keywords.some(kw => text.includes(kw))) {
                labels.add(rule.label);
              }
            }

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [...labels],
              });
              console.log(`Added labels: ${[...labels].join(', ')}`);
            } else {
              console.log('No matching keywords found, no labels added.');
            }
