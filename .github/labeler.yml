# Path-based labeler configuration for PRs
# Used by .github/workflows/auto-label-pr.yml
# Only labels that exist in the repository are used.

# --- Core modules ---
"component: broker":
  - changed-files:
      - any-glob-to-any-file: 'pinot-broker/**'

"component: controller":
  - changed-files:
      - any-glob-to-any-file: 'pinot-controller/**'

"component: server":
  - changed-files:
      - any-glob-to-any-file: 'pinot-server/**'

minion:
  - changed-files:
      - any-glob-to-any-file: 'pinot-minion/**'

# --- Query engine ---
"component: query-planner":
  - changed-files:
      - any-glob-to-any-file: 'pinot-query-planner/**'

"component: query-runtime":
  - changed-files:
      - any-glob-to-any-file: 'pinot-query-runtime/**'

# --- Segment & indexing ---
"component: segment":
  - changed-files:
      - any-glob-to-any-file:
          - 'pinot-segment-local/**'
          - 'pinot-segment-spi/**'

# --- Plugins ---
plugins:
  - changed-files:
      - any-glob-to-any-file: 'pinot-plugins/**'

pinot-filesystem:
  - changed-files:
      - any-glob-to-any-file: 'pinot-plugins/pinot-file-system/**'

ingestion:
  - changed-files:
      - any-glob-to-any-file:
          - 'pinot-plugins/pinot-stream-ingestion/**'
          - 'pinot-plugins/pinot-batch-ingestion/**'

kafka:
  - changed-files:
      - any-glob-to-any-file:
          - 'pinot-plugins/pinot-stream-ingestion/pinot-kafka-base/**'
          - 'pinot-plugins/pinot-stream-ingestion/pinot-kafka-3.0/**'
          - 'pinot-plugins/pinot-stream-ingestion/pinot-kafka-4.0/**'

kinesis:
  - changed-files:
      - any-glob-to-any-file: 'pinot-plugins/pinot-stream-ingestion/pinot-kinesis/**'

pulsar:
  - changed-files:
      - any-glob-to-any-file: 'pinot-plugins/pinot-stream-ingestion/pinot-pulsar/**'

metrics:
  - changed-files:
      - any-glob-to-any-file: 'pinot-plugins/pinot-metrics/**'

# --- Connectors ---
"component: connector":
  - changed-files:
      - any-glob-to-any-file: 'pinot-connectors/**'

# --- Integration tests ---
testing:
  - changed-files:
      - any-glob-to-any-file:
          - 'pinot-integration-tests/**'
          - 'pinot-integration-test-base/**'
          - 'pinot-compatibility-verifier/**'
          - 'pinot-udf-test/**'
          - 'pinot-perf/**'

# --- Tooling & build ---
tools:
  - changed-files:
      - any-glob-to-any-file: 'pinot-tools/**'

buildAndPackage:
  - changed-files:
      - any-glob-to-any-file:
          - 'pinot-distribution/**'
          - '**/pom.xml'
          - '.mvn/**'
          - 'mvnw*'

# --- CI/CD ---
"ci/cd":
  - changed-files:
      - any-glob-to-any-file: '.github/**'

# --- Docker ---
docker:
  - changed-files:
      - any-glob-to-any-file:
          - '**/Dockerfile'
          - 'docker/**'

# --- Documentation ---
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'LICENSE'
          - 'NOTICE'

# --- Timeseries ---
timeseries-engine:
  - changed-files:
      - any-glob-to-any-file: 'pinot-timeseries/**'
