{{- if .Values.zookeeper.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pinot.zookeeper.headless" . }}
  namespace: {{ include "pinot.namespace" . }}
  labels:
    {{- include "pinot.zookeeperLabels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: client
      port: {{ .Values.zookeeper.port }}
      targetPort: client
    - name: follower
      port: {{ .Values.zookeeper.followerPort }}
      targetPort: follower
    - name: election
      port: {{ .Values.zookeeper.electionPort }}
      targetPort: election
    {{- if .Values.zookeeper.adminServer.enabled }}
    - name: admin
      port: {{ .Values.zookeeper.adminServer.port }}
      targetPort: admin
    {{- end }}
  selector:
    {{- include "pinot.zookeeperMatchLabels" . | nindent 4 }}
{{- end }}
